<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vector logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b2230"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="green" x1="120" y1="392" x2="392" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#26a641"/>
      <stop offset="1" stop-color="#39d353"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- app-icon badge -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" fill="none" stroke="#2c3442" stroke-width="1"/>

  <!-- ascending contribution squares (the "green squares" trail) -->
  <g opacity="0.9">
    <rect x="120" y="300" width="40" height="40" rx="9" fill="url(#green)" opacity="0.35"/>
    <rect x="186" y="252" width="40" height="40" rx="9" fill="url(#green)" opacity="0.55"/>
    <rect x="252" y="204" width="40" height="40" rx="9" fill="url(#green)" opacity="0.78"/>
  </g>

  <!-- the vector: bold arrow pointing up-and-right -->
  <g filter="url(#glow)">
    <path d="M150 362 L322 190"
          stroke="url(#green)" stroke-width="44" stroke-linecap="round"/>
    <path d="M236 172 L344 172 L344 280"
          fill="none" stroke="url(#green)" stroke-width="44"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- origin node -->
  <circle cx="150" cy="362" r="14" fill="#0d1117" stroke="url(#green)" stroke-width="10"/>
</svg>
