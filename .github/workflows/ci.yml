name: CI

# Run the full test suite across operating systems and Node versions.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install git-filter-repo (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y git-filter-repo

      - name: Install git-filter-repo (macOS)
        if: runner.os == 'macOS'
        run: brew install git-filter-repo

      - name: Configure a git identity (integration tests create commits)
        run: |
          git config --global user.name  "Vector CI"
          git config --global user.email "ci@vector.invalid"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
